services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gameboxd
      POSTGRES_PASSWORD: password
      POSTGRES_DB: gameboxd
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gameboxd -d gameboxd"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: gameboxd
      DB_USER: gameboxd
      DB_PASSWORD: password
    depends_on:
      postgres:
        condition: service_healthy
